# GPT-OSS-20B — Fallback / fast build agent
#
# Smaller variant: 20.9B total params, 3.6B active. 2-3x faster
# inference than 120B with nearly identical SWE-bench scores
# (60.7% vs 62.4%). Use when latency matters more than marginal
# accuracy, or as fallback when 120B fails a build gate twice.
#
# Same API contract as 120B — swap by pointing at this file.

name: gpt-oss-20b

# ── Connection ───────────────────────────────────────────────
base_url: "http://localhost:1234/v1"
model: "gpt-oss-20b"
api_key: "lm-studio"

# ── Generation ───────────────────────────────────────────────
max_tokens: 8192
temperature: 1.0
top_p: 1.0
reasoning_effort: "high"

# ── Context management ───────────────────────────────────────
strip_reasoning_older_turns: true

# ── Loop limits ──────────────────────────────────────────────
# Faster model = can afford slightly higher turn limit.
max_turns: 25
# Faster inference = shorter timeout is fine.
timeout_seconds: 300

# ── Role mapping ─────────────────────────────────────────────
use_developer_role: true

# ── Optional overrides ───────────────────────────────────────
eos_token_ids: []
extra_params: {}
